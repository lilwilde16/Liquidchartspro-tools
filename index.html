<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>LiquidChartsPro Tools</title>

  <!-- LiquidCharts widget must load first -->
  <script src="https://pro.liquidcharts.com/scripts/widget-js"></script>
  <link rel="stylesheet" href="https://pro.liquidcharts.com/scripts/widget-css">
  <link rel="stylesheet" href="./css/app.css">
</head>

<body class="Widget">
  <!-- Hidden fields required by lc-framework.js for context detection and pair management -->
  <input id="ctxInstrument" type="hidden" value="Unknown" />
  <input id="ctxTf" type="hidden" value="Unknown" />
  <textarea id="pairs" style="display:none">NAS100
EUR/USD
GBP/USD
USD/JPY
AUD/USD
NZD/USD
USD/CAD
USD/CHF
EUR/GBP
EUR/JPY
GBP/JPY</textarea>

  <div id="app">
    <div class="card">
      <h1 class="title">ENTRY &rarr; then CHANGE(101) TP/SL (Reliable)</h1>

      <div class="row">
        <div class="field">
          <label>Instrument</label>
          <select id="toolPair">
            <option>NAS100</option>
            <option>EUR/USD</option>
            <option>GBP/USD</option>
            <option>USD/JPY</option>
          </select>
        </div>
        <div class="field">
          <label>Lots</label>
          <input id="toolQty" type="number" value="0.01" min="0.01" step="0.01" />
        </div>
        <div class="field">
          <label>TP distance (price points)</label>
          <input id="toolTpPips" type="number" value="55" step="5" />
        </div>
        <div class="field">
          <label>SL distance (price points)</label>
          <input id="toolSlPips" type="number" value="55" step="5" />
        </div>
        <div class="field">
          <label>ARM</label>
          <select id="toolArm">
            <option value="off" selected>OFF (Ticket only)</option>
            <option value="on">ON (SendOrder)</option>
          </select>
        </div>
      </div>

      <div class="btnRow">
        <button id="btnTicket" disabled>Open Ticket</button>
        <button id="btnBuyTPSL" class="primary" disabled>BUY (ENTRY) then CHANGE TP/SL</button>
        <button id="btnSellTPSL" disabled>SELL (ENTRY) then CHANGE TP/SL</button>
        <button id="btnDumpTrades" disabled>Dump Orders</button>
        <button id="btnClearLog">Clear Log</button>
      </div>

      <div class="statusBar">
        <label id="toolPx">bid/ask: &hellip; / &hellip;</label>
        <div class="pill" id="statusPill">Loading&hellip;</div>
      </div>

      <p class="note">
        This version does NOT send TP/SL at entry.<br>
        It places the trade first, then applies TP/SL using <strong>CHANGE (101)</strong> as soon as the orderId exists.
      </p>
    </div>

    <div class="card">
      <h2 class="title">Log</h2>
      <div id="log" class="log"></div>
    </div>
  </div>

  <!-- Scripts: framework core + settings persistence -->
  <script src="./js/lc-framework.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
