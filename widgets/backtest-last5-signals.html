<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Backtest – Last 5 SMA Crossover Signals</title>

  <!-- LiquidCharts platform styles and scripts must load first -->
  <link rel="stylesheet" href="https://pro.liquidcharts.com/css/widget-css" />
  <script src="https://pro.liquidcharts.com/scripts/widget-js"></script>

  <style>
    body { font-family: sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 10px; }
    h2   { margin: 0 0 8px; font-size: 15px; color: #7ec8e3; }
    .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    label { font-size: 11px; color: #aaa; display: block; margin-bottom: 2px; }
    select, input[type=number] {
      background: #0f3460; color: #e0e0e0; border: 1px solid #444;
      border-radius: 4px; padding: 3px 6px; font-size: 12px; width: 100%;
    }
    .field { display: flex; flex-direction: column; min-width: 80px; }
    button {
      background: #16213e; color: #7ec8e3; border: 1px solid #7ec8e3;
      border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px;
      transition: background 0.15s;
    }
    button:hover { background: #0f3460; }
    #results { margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: #0f3460; color: #7ec8e3; padding: 5px 8px; text-align: left; }
    td { padding: 4px 8px; border-bottom: 1px solid #333; }
    .bull { color: #4caf50; }
    .bear { color: #f44336; }
    #log {
      margin-top: 10px; background: #0a0a1a; border: 1px solid #333;
      border-radius: 4px; padding: 6px 8px; font-size: 11px; font-family: monospace;
      max-height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    #status { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  </style>
</head>

<body class="Widget">

  <h2>📊 Backtest – Last 5 SMA Crossover Signals</h2>

  <div class="row">
    <div class="field" style="min-width:110px;">
      <label>Instrument</label>
      <input id="btInstrument" type="text" value="EUR/USD"
             style="background:#0f3460;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:3px 6px;font-size:12px;" />
    </div>
    <div class="field">
      <label>Timeframe</label>
      <select id="btTf">
        <option value="M1">M1</option>
        <option value="M5">M5</option>
        <option value="M15" selected>M15</option>
        <option value="M30">M30</option>
        <option value="H1">H1</option>
        <option value="H4">H4</option>
        <option value="D1">D1</option>
      </select>
    </div>
    <div class="field">
      <label>Lookback</label>
      <input id="btLookback" type="number" value="500" min="50" max="5000" step="50" />
    </div>
    <div class="field">
      <label>Fast SMA</label>
      <input id="btFast" type="number" value="9" min="2" max="200" step="1" />
    </div>
    <div class="field">
      <label>Slow SMA</label>
      <input id="btSlow" type="number" value="21" min="3" max="500" step="1" />
    </div>
  </div>

  <div class="row">
    <button id="btnRun">▶ Run (Last 5 Signals)</button>
    <button id="btnDump">🔍 Dump Sample Candle</button>
    <button id="btnClear">🗑 Clear Log</button>
  </div>

  <div id="status">Ready.</div>

  <div id="results"></div>
  <div id="log"></div>

  <script>
    /* ── helpers ── */
    function $(id){ return document.getElementById(id); }

    function log(msg){
      const el = $("log");
      el.textContent += "[" + fmtTime(new Date()) + "] " + msg + "\n";
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg){ $("status").textContent = msg; }

    /** Format a Date to HH:MM:SS */
    function fmtTime(d){
      const pad = n => String(n).padStart(2,"0");
      return pad(d.getUTCHours()) + ":" + pad(d.getUTCMinutes()) + ":" + pad(d.getUTCSeconds()) + " UTC";
    }

    /** Convert an ms-epoch timestamp to a human-readable string */
    function toChron(ms){
      const d = new Date(ms);
      const pad = n => String(n).padStart(2,"0");
      return d.getUTCFullYear() + "-" + pad(d.getUTCMonth()+1) + "-" + pad(d.getUTCDate())
           + " " + pad(d.getUTCHours()) + ":" + pad(d.getUTCMinutes());
    }

    /** Simple Moving Average of the last `period` values ending at index i */
    function sma(arr, i, period){
      if(i < period - 1) return null;
      let sum = 0;
      for(let j = i - period + 1; j <= i; j++) sum += arr[j];
      return sum / period;
    }

    /**
     * Request candles via Sway.Framework, supporting both the Promise-based
     * (pRequestCandles) and callback-based (RequestCandles) APIs.
     */
    async function requestCandles(instrumentId, timeframe, count){
      if(Framework.pRequestCandles){
        return await Framework.pRequestCandles({ instrumentId, timeframe, count, streaming: false });
      }
      return await new Promise((resolve) => {
        Framework.RequestCandles({ instrumentId, timeframe, count, streaming: false }, m => resolve(m));
      });
    }

    /* ── main backtest logic ── */
    async function runBacktest(){
      const instrument = $("btInstrument").value.trim() || "EUR/USD";
      const tf         = $("btTf").value;
      const lookback   = Math.max(50, parseInt($("btLookback").value) || 500);
      const fastPeriod = Math.max(2,  parseInt($("btFast").value)     || 9);
      const slowPeriod = Math.max(3,  parseInt($("btSlow").value)     || 21);

      if(fastPeriod >= slowPeriod){
        log("❌ Fast SMA period must be less than Slow SMA period.");
        return;
      }

      setStatus("Fetching candles…");
      log("▶ Requesting " + lookback + " × " + tf + " candles for " + instrument + " …");

      let msg;
      try{
        msg = await requestCandles(instrument, tf, lookback);
      }catch(e){
        log("❌ requestCandles error: " + (e.message || String(e)));
        setStatus("Error.");
        return;
      }

      // Normalise the candle array – the API may return { candles: [...] } or a bare array
      const raw    = (msg && msg.candles) ? msg.candles : (Array.isArray(msg) ? msg : []);
      // Skip the last (forming) bar – only operate on closed candles
      const candles = raw.slice(0, raw.length - 1);

      log("✅ Received " + raw.length + " candles; using " + candles.length + " closed bars.");

      if(candles.length < slowPeriod + 2){
        log("❌ Not enough candles to compute SMA(" + slowPeriod + ").");
        setStatus("Insufficient data.");
        return;
      }

      // Build close-price array
      const closes = candles.map(c => typeof c.c === "number" ? c.c : parseFloat(c.c));
      const times  = candles.map(c => c.t);

      // Scan for crossovers (oldest → newest); collect the last 5
      const signals = [];
      for(let i = slowPeriod; i < closes.length; i++){
        const fastNow  = sma(closes, i,   fastPeriod);
        const slowNow  = sma(closes, i,   slowPeriod);
        const fastPrev = sma(closes, i-1, fastPeriod);
        const slowPrev = sma(closes, i-1, slowPeriod);

        if(fastNow === null || slowNow === null || fastPrev === null || slowPrev === null) continue;

        if(fastPrev <= slowPrev && fastNow > slowNow){
          signals.push({ type: "BUY",  time: times[i], close: closes[i], idx: i });
        } else if(fastPrev >= slowPrev && fastNow < slowNow){
          signals.push({ type: "SELL", time: times[i], close: closes[i], idx: i });
        }
      }

      const last5 = signals.slice(-5);
      log("Found " + signals.length + " total crossover signal(s); displaying last " + last5.length + ".");
      renderSignals(last5, instrument, tf, fastPeriod, slowPeriod, candles.length);
      setStatus("Done – " + signals.length + " signal(s) found.");
    }

    function renderSignals(signals, instrument, tf, fast, slow, totalBars){
      const el = $("results");
      if(signals.length === 0){
        el.innerHTML = "<p style='color:#aaa;font-size:12px;'>No crossover signals found in the selected range.</p>";
        return;
      }

      const rows = signals.map((s, idx) => {
        const cls  = s.type === "BUY" ? "bull" : "bear";
        const icon = s.type === "BUY" ? "▲" : "▼";
        // candlesAgo: how many closed bars ago was this signal?
        const ago  = totalBars - 1 - s.idx;
        return `<tr>
          <td>${signals.length - idx}</td>
          <td class="${cls}">${icon} ${s.type}</td>
          <td>${toChron(s.time)}</td>
          <td>${s.close.toFixed(5)}</td>
          <td>${ago} bar(s) ago</td>
        </tr>`;
      }).reverse().join("");

      el.innerHTML = `
        <p style="font-size:11px;color:#aaa;margin:4px 0;">
          ${instrument} | ${tf} | SMA(${fast}) × SMA(${slow}) — last ${signals.length} of up to 5
        </p>
        <table>
          <thead><tr><th>#</th><th>Type</th><th>Time (UTC)</th><th>Close</th><th>Age</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function dumpSampleCandle(){
      const instrument = $("btInstrument").value.trim() || "EUR/USD";
      const tf         = $("btTf").value;
      log("🔍 Dumping latest candle for " + instrument + " " + tf + " …");
      let msg;
      try{
        msg = await requestCandles(instrument, tf, 5);
      }catch(e){
        log("❌ " + (e.message || String(e)));
        return;
      }
      const raw = (msg && msg.candles) ? msg.candles : (Array.isArray(msg) ? msg : []);
      if(raw.length === 0){ log("No candles returned."); return; }
      log("Sample candle: " + JSON.stringify(raw[raw.length - 1]));
      log("Candle keys: " + Object.keys(raw[raw.length - 1]).join(", "));
    }

    /* ── button wiring ── */
    $("btnRun").onclick   = runBacktest;
    $("btnDump").onclick  = dumpSampleCandle;
    $("btnClear").onclick = () => { $("log").textContent = ""; $("results").innerHTML = ""; setStatus("Ready."); };

    /* ── Framework lifecycle ── */
    Framework.OnLoad = function(){
      setStatus("Framework connected.");
      log("✅ Framework loaded – ready to run.");
    };
  </script>

</body>
</html>
